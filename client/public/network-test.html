<!DOCTYPE html>
<html>
<head>
    <title>Network Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        pre {
            background: #333;
            color: #0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 Network Connectivity Test</h1>
    <p>This page will test if Chrome can connect to the backend server.</p>

    <div class="test">
        <h2>Test 1: Fetch API (Native)</h2>
        <button onclick="testFetch()">Test with Fetch</button>
        <div id="fetch-result"></div>
    </div>

    <div class="test">
        <h2>Test 2: XMLHttpRequest (Old School)</h2>
        <button onclick="testXHR()">Test with XHR</button>
        <div id="xhr-result"></div>
    </div>

    <div class="test">
        <h2>Test 3: POST Request (Like Registration)</h2>
        <button onclick="testPOST()">Test POST Request</button>
        <div id="post-result"></div>
    </div>

    <div class="test">
        <h2>Test 4: Image Load Test</h2>
        <button onclick="testImage()">Test Image Load</button>
        <div id="image-result"></div>
    </div>

    <script>
        // Test 1: Fetch API
        async function testFetch() {
            const result = document.getElementById('fetch-result');
            result.innerHTML = 'Testing...';

            try {
                const response = await fetch('http://127.0.0.1:5001/api/health');
                const data = await response.json();
                result.innerHTML = '<span class="success">✓ SUCCESS!</span><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                result.innerHTML = '<span class="error">✗ FAILED: ' + error.message + '</span><br>' +
                    '<strong>Error Type:</strong> ' + error.name + '<br>' +
                    '<strong>This means:</strong> Chrome cannot connect to backend at all!';
            }
        }

        // Test 2: XMLHttpRequest
        function testXHR() {
            const result = document.getElementById('xhr-result');
            result.innerHTML = 'Testing...';

            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'http://127.0.0.1:5001/api/health', true);

            xhr.onload = function() {
                if (xhr.status === 200) {
                    result.innerHTML = '<span class="success">✓ SUCCESS!</span><pre>' + xhr.responseText + '</pre>';
                } else {
                    result.innerHTML = '<span class="error">✗ FAILED: Status ' + xhr.status + '</span>';
                }
            };

            xhr.onerror = function() {
                result.innerHTML = '<span class="error">✗ FAILED: Network Error</span><br>' +
                    '<strong>This means:</strong> Chrome blocked the request!';
            };

            xhr.send();
        }

        // Test 3: POST Request
        async function testPOST() {
            const result = document.getElementById('post-result');
            result.innerHTML = 'Testing...';

            try {
                const response = await fetch('http://127.0.0.1:5001/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@test.com',
                        password: 'Test@123456'
                    })
                });

                const data = await response.json();
                result.innerHTML = '<span class="success">✓ REQUEST SENT!</span><br>' +
                    'Status: ' + response.status + '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                result.innerHTML = '<span class="error">✗ FAILED: ' + error.message + '</span><br>' +
                    '<strong>Error Type:</strong> ' + error.name + '<br>' +
                    '<strong>This is the SAME error your React app is getting!</strong>';
            }
        }

        // Test 4: Image Load (Different protocol)
        function testImage() {
            const result = document.getElementById('image-result');
            result.innerHTML = 'Testing...';

            const img = new Image();
            img.onload = function() {
                result.innerHTML = '<span class="success">✓ Image loaded (network works)</span>';
            };
            img.onerror = function() {
                result.innerHTML = '<span class="error">✗ Image failed to load</span>';
            };
            img.src = 'http://127.0.0.1:5001/api/health?' + Date.now();
        }

        // Auto-run Test 1 on page load
        window.onload = function() {
            console.log('Page loaded. Click buttons to test connectivity.');
        };
    </script>
</body>
</html>
